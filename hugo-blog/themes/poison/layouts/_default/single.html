{{ define "main" }}
<article>
  <header>
    <h1>{{ .Title }}</h1>
    <time>{{ .Date.Format "2006-01-02" }}</time>
    {{ with .Params.tags }}
    <div class="tags">
      {{ range . }}
      <span>{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}
  </header>
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
