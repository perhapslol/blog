{{ define "main" }}
  <article class="post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <p class="post-meta">
        {{ .Date.Format "2006-01-02" }}
        {{ with .Params.categories }}
        | 分类: {{ range . }}<a href="{{ "/categories/" | relURL }}{{ . | urlize }}">{{ . }}</a>{{ end }}
        {{ end }}
        {{ with .Params.tags }}
        | 标签: {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
        {{ end }}
      </p>
    </header>
    <div class="post-content">
      {{ .Content }}
    </div>
    <footer class="post-footer">
      <hr>
      <p>作者: {{ .Site.Params.author }}</p>
    </footer>
  </article>
{{ end }}
