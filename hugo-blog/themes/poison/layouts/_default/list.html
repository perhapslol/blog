{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <ul class="post-list">
    {{ range .Pages }}
    <li>
      <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <p>{{ .Summary }}</p>
      {{ with .Params.tags }}
      <div class="tags">
        {{ range . }}
        <span class="tag">{{ . }}</span>
        {{ end }}
      </div>
      {{ end }}
    </li>
    {{ end }}
  </ul>
{{ end }}
