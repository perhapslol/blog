<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>电子书阅读器</title>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background-color: #FAF9F6;
            color: #222;
            height: 100%;
            overflow: hidden;
        }
        
        :root {
            --primary-color: #268bd2;
            --secondary-color: #586e75;
            --bg-color: #FAF9F6;
            --text-color: #222;
            --sidebar-bg: #202020;
            --sidebar-text: #909090;
        }
        
        body.dark-theme {
            background-color: #121212;
            color: #eee;
            --bg-color: #121212;
            --text-color: #eee;
        }
        
        .reader-container {
            display: flex;
            height: 100vh;
        }
        
        .reader-sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }
        
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #333;
        }
        
        .sidebar-header h2 {
            margin: 0 0 0.5rem 0;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .sidebar-header p {
            margin: 0;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .toc-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .toc-item {
            margin-bottom: 0.25rem;
        }
        
        .toc-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.875rem;
            display: block;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            transition: background-color 0.15s ease, color 0.15s ease;
        }
        
        .toc-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #268bd2;
        }
        
        .toc-link.active {
            background-color: rgba(38, 139, 210, 0.2);
            color: #268bd2;
        }
        
        .toc-item.level-1 .toc-link { padding-left: 0.6rem; }
        .toc-item.level-2 .toc-link { padding-left: 1.2rem; }
        .toc-item.level-3 .toc-link { padding-left: 1.8rem; }
        
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid #333;
            display: flex;
            gap: 0.5rem;
        }
        
        .sidebar-footer button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        
        .sidebar-footer button:hover {
            background-color: #444;
        }
        
        .reader-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .reader-toolbar {
            padding: 1rem 2rem;
            background-color: rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        
        body.dark-theme .reader-toolbar {
            background-color: rgba(255, 255, 255, 0.05);
            border-bottom-color: #333;
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .toolbar-left h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #303030;
        }
        
        body.dark-theme .toolbar-left h1 {
            color: #DBE2E9;
        }
        
        .toolbar-center {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: #666;
            transition: all 0.2s ease;
        }
        
        body.dark-theme .btn {
            border-color: #444;
            color: #9a9a9a;
        }
        
        .btn:hover {
            background-color: #f0f0f0;
            color: #333;
        }
        
        body.dark-theme .btn:hover {
            background-color: #333;
            color: #fff;
        }
        
        .btn-icon {
            padding: 0.4rem;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-icon svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        
        .progress-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .progress-bar {
            width: 150px;
            height: 6px;
            background-color: #ddd;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }
        
        body.dark-theme .progress-bar {
            background-color: #333;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #268bd2;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 0.75rem;
            color: #888;
            min-width: 50px;
        }
        
        body.dark-theme .progress-text {
            color: #666;
        }
        
        .reader-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 4rem;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-color);
            background-color: var(--bg-color);
        }
        
        body.dark-theme .reader-content {
            background-color: #1a1a1a;
        }
        
        .reader-content h1,
        .reader-content h2,
        .reader-content h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #303030;
        }
        
        body.dark-theme .reader-content h1,
        body.dark-theme .reader-content h2,
        body.dark-theme .reader-content h3 {
            color: #DBE2E9;
        }
        
        .reader-content h1 { font-size: 1.8rem; }
        .reader-content h2 { font-size: 1.5rem; }
        .reader-content h3 { font-size: 1.3rem; }
        
        .reader-content p {
            margin-bottom: 1rem;
            text-align: justify;
            text-indent: 2em;
        }
        
        .reader-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1rem auto;
        }
        
        .reader-content a {
            color: #268bd2;
            text-decoration: none;
        }
        
        .reader-content a:hover {
            text-decoration: underline;
        }
        
        .reader-content blockquote {
            border-left: 3px solid #268bd2;
            padding-left: 1rem;
            margin-left: 0;
            color: #666;
            font-style: italic;
        }
        
        body.dark-theme .reader-content blockquote {
            color: #9a9a9a;
        }
        
        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .font-size-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #666;
        }
        
        body.dark-theme .font-size-btn {
            border-color: #444;
            color: #9a9a9a;
        }
        
        .font-size-btn:hover {
            background-color: #f0f0f0;
        }
        
        body.dark-theme .font-size-btn:hover {
            background-color: #333;
        }
        
        .font-size-value {
            font-size: 0.8rem;
            color: #888;
            min-width: 30px;
            text-align: center;
        }
        
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
        }
        
        body.dark-theme .loading-container {
            color: #666;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #268bd2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        body.dark-theme .loading-spinner {
            border-color: #333;
            border-top-color: #268bd2;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media screen and (max-width: 768px) {
            .reader-container {
                flex-direction: column;
            }
            
            .reader-sidebar {
                width: 100%;
                height: 200px;
                border-right: none;
                border-bottom: 1px solid #333;
            }
            
            .reader-content {
                padding: 1rem;
                font-size: 1rem;
            }
            
            .reader-toolbar {
                padding: 0.75rem 1rem;
            }
            
            .toolbar-center {
                display: none;
            }
            
            .progress-bar {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="reader-container">
        <aside class="reader-sidebar">
            <div class="sidebar-header">
                <h2 id="book-title">电子书阅读器</h2>
                <p id="book-author">加载中...</p>
            </div>
            
            <div class="toc-container" id="toc-container">
                <ul class="toc-list" id="toc-list">
                    <li class="toc-item level-1">
                        <span class="toc-link">目录加载中...</span>
                    </li>
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <button onclick="toggleTheme()">主题</button>
                <button onclick="closeReader()">关闭</button>
            </div>
        </aside>
        
        <main class="reader-main">
            <div class="reader-toolbar">
                <div class="toolbar-left">
                    <button class="btn btn-icon" onclick="goBack()">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M19 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H19v-2z"/>
                        </svg>
                    </button>
                    <h1 id="current-title">阅读器</h1>
                </div>
                
                <div class="toolbar-center">
                    <div class="progress-container">
                        <button class="btn btn-icon" onclick="goPrev()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                            </svg>
                        </button>
                        <div class="progress-bar" onclick="handleProgressClick(event)">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <span class="progress-text" id="progress-text">0%</span>
                        <button class="btn btn-icon" onclick="goNext()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M18 6h-2v12h2zm-3.5-6l-8.5 6v6l8.5 6V0z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <div class="font-size-controls">
                        <button class="font-size-btn" onclick="decreaseFont()">A-</button>
                        <span class="font-size-value" id="font-size-value">18</span>
                        <button class="font-size-btn" onclick="increaseFont()">A+</button>
                    </div>
                </div>
            </div>
            
            <div class="reader-content" id="reader-content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>正在加载电子书...</p>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let book = null;
        let rendition = null;
        let currentFontSize = 18;
        
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        function loadBook() {
            const bookPath = getURLParameter('book');
            
            if (!bookPath) {
                document.getElementById('reader-content').innerHTML = 
                    '<div class="loading-container"><p>未指定电子书文件</p></div>';
                return;
            }
            
            book = ePub(bookPath);
            
            book.loaded.metadata.then(function(meta) {
                document.getElementById('book-title').textContent = meta.title || '未知标题';
                document.getElementById('book-author').textContent = meta.creator || '未知作者';
            });
            
            book.loaded.navigation.then(function(toc) {
                renderTOC(toc);
            });
            
            book.loaded.cover.then(function(cover) {
                console.log('Cover loaded');
            });
            
            book.ready.then(function() {
                const readerContent = document.getElementById('reader-content');
                readerContent.innerHTML = '';
                
                rendition = book.renderTo(readerContent, {
                    width: '100%',
                    height: '100%',
                    flow: 'paginated'
                });
                
                rendition.display();
                
                rendition.on('rendered', function() {
                    updateProgress();
                    updateCurrentTitle();
                });
                
                rendition.on('locationChanged', function() {
                    updateProgress();
                    updateCurrentTitle();
                });
            }).catch(function(err) {
                console.error('Error loading book:', err);
                document.getElementById('reader-content').innerHTML = 
                    '<div class="loading-container"><p>加载电子书失败</p></div>';
            });
        }
        
        function renderTOC(toc) {
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';
            
            function renderItem(item, level = 1) {
                const li = document.createElement('li');
                li.className = `toc-item level-${level}`;
                
                const link = document.createElement('a');
                link.className = 'toc-link';
                link.textContent = item.label;
                link.href = '#';
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    rendition.display(item.href);
                    document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                });
                
                li.appendChild(link);
                tocList.appendChild(li);
                
                if (item.subitems && item.subitems.length > 0) {
                    item.subitems.forEach(subitem => renderItem(subitem, level + 1));
                }
            }
            
            toc.forEach(item => renderItem(item));
        }
        
        function updateProgress() {
            if (!rendition || !book) return;
            
            const location = rendition.currentLocation();
            const progress = book.locations.percentageFromLocation(location.start);
            
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `${Math.round(progress)}%`;
        }
        
        function updateCurrentTitle() {
            if (!rendition || !book) return;
            
            const location = rendition.currentLocation();
            book.loaded.navigation.then(function(toc) {
                let currentTitle = '阅读中';
                const findTitle = function(items) {
                    for (let item of items) {
                        if (location.start.href.indexOf(item.href) !== -1) {
                            currentTitle = item.label;
                            return true;
                        }
                        if (item.subitems && findTitle(item.subitems)) {
                            return true;
                        }
                    }
                    return false;
                };
                findTitle(toc);
                document.getElementById('current-title').textContent = currentTitle;
            });
        }
        
        function goPrev() {
            if (rendition) {
                rendition.prev();
            }
        }
        
        function goNext() {
            if (rendition) {
                rendition.next();
            }
        }
        
        function goBack() {
            window.history.back();
        }
        
        function handleProgressClick(event) {
            if (!rendition || !book) return;
            
            const rect = event.currentTarget.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            
            const location = book.locations.locationFromPercentage(percent);
            rendition.display(location);
        }
        
        function increaseFont() {
            if (currentFontSize < 32) {
                currentFontSize++;
                updateFontSize();
            }
        }
        
        function decreaseFont() {
            if (currentFontSize > 12) {
                currentFontSize--;
                updateFontSize();
            }
        }
        
        function updateFontSize() {
            document.getElementById('font-size-value').textContent = currentFontSize;
            document.getElementById('reader-content').style.fontSize = `${currentFontSize}px`;
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('reader-theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        }
        
        function closeReader() {
            window.close();
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const theme = localStorage.getItem('reader-theme') || 'light';
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            }
            
            updateFontSize();
            
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js';
            script.onload = loadBook;
            document.head.appendChild(script);
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                goPrev();
            } else if (e.key === 'ArrowRight') {
                goNext();
            }
        });
    </script>
</body>
</html>
