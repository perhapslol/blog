<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>电子书阅读器</title>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background-color: #FAF9F6;
            color: #222;
            height: 100%;
            overflow: hidden;
        }
        
        :root {
            --sidebar-bg: #202020;
        }
        
        body.dark-theme {
            background-color: #121212;
            color: #eee;
        }
        
        .reader-container {
            display: flex;
            height: 100vh;
        }
        
        .reader-sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: #909090;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }
        
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #333;
        }
        
        .sidebar-header h2 {
            margin: 0 0 0.5rem 0;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .sidebar-header p {
            margin: 0;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .toc-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .toc-item {
            margin-bottom: 0.5rem;
        }
        
        .toc-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.875rem;
            display: block;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            transition: background-color 0.15s ease, color 0.15s ease;
        }
        
        .toc-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #268bd2;
        }
        
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid #333;
            display: flex;
            gap: 0.5rem;
        }
        
        .sidebar-footer button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        
        .sidebar-footer button:hover {
            background-color: #444;
        }
        
        .reader-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .reader-toolbar {
            padding: 1rem 2rem;
            background-color: rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        
        body.dark-theme .reader-toolbar {
            background-color: rgba(255, 255, 255, 0.05);
            border-bottom-color: #333;
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .toolbar-left h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #303030;
        }
        
        body.dark-theme .toolbar-left h1 {
            color: #DBE2E9;
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: #666;
            transition: all 0.2s ease;
        }
        
        body.dark-theme .btn {
            border-color: #444;
            color: #9a9a9a;
        }
        
        .btn:hover {
            background-color: #f0f0f0;
            color: #333;
        }
        
        body.dark-theme .btn:hover {
            background-color: #333;
            color: #fff;
        }
        
        .btn-icon {
            padding: 0.4rem;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-icon svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        
        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .font-size-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #666;
        }
        
        body.dark-theme .font-size-btn {
            border-color: #444;
            color: #9a9a9a;
        }
        
        .font-size-value {
            font-size: 0.8rem;
            color: #888;
            min-width: 30px;
            text-align: center;
        }
        
        .reader-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 4rem;
            font-size: 1.1rem;
            line-height: 1.8;
            background-color: #fff;
        }
        
        body.dark-theme .reader-content {
            background-color: #1a1a1a;
        }
        
        .reader-content h1, .reader-content h2, .reader-content h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #303030;
        }
        
        body.dark-theme .reader-content h1, 
        body.dark-theme .reader-content h2, 
        body.dark-theme .reader-content h3 {
            color: #DBE2E9;
        }
        
        .reader-content h1 { font-size: 1.8rem; }
        .reader-content h2 { font-size: 1.5rem; }
        .reader-content h3 { font-size: 1.3rem; }
        
        .reader-content p {
            margin-bottom: 1rem;
            text-align: justify;
            text-indent: 2em;
        }
        
        .reader-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1rem auto;
        }
        
        .reader-content a {
            color: #268bd2;
            text-decoration: none;
        }
        
        .reader-content blockquote {
            border-left: 3px solid #268bd2;
            padding-left: 1rem;
            margin-left: 0;
            color: #666;
            font-style: italic;
        }
        
        body.dark-theme .reader-content blockquote {
            color: #9a9a9a;
        }
        
        .loading-container, .error-container, .unsupported-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
        }
        
        body.dark-theme .loading-container, 
        body.dark-theme .error-container,
        body.dark-theme .unsupported-container {
            color: #666;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #268bd2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        body.dark-theme .loading-spinner {
            border-color: #333;
            border-top-color: #268bd2;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-container h2, .unsupported-container h2 {
            color: #e74c3c;
            margin-bottom: 1rem;
        }
        
        .unsupported-container h2 {
            color: #f39c12;
        }
        
        .error-container button, .unsupported-container button {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #268bd2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .error-container button:hover, .unsupported-container button:hover {
            background-color: #1a6bb9;
        }
        
        .download-link {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #27ae60;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
        }
        
        .download-link:hover {
            background-color: #2ecc71;
        }
        
        .pdf-container {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        @media screen and (max-width: 768px) {
            .reader-container {
                flex-direction: column;
            }
            
            .reader-sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #333;
            }
            
            .toc-container {
                max-height: 200px;
            }
            
            .reader-content {
                padding: 1rem;
                font-size: 1rem;
            }
            
            .reader-toolbar {
                padding: 0.75rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="reader-container">
        <aside class="reader-sidebar">
            <div class="sidebar-header">
                <h2 id="book-title">电子书阅读器</h2>
                <p id="book-author">加载中...</p>
            </div>
            
            <div class="toc-container" id="toc-container">
                <ul class="toc-list" id="toc-list">
                    <li class="toc-item">
                        <span class="toc-link">目录加载中...</span>
                    </li>
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <button onclick="toggleTheme()">主题</button>
                <button onclick="closeReader()">关闭</button>
            </div>
        </aside>
        
        <main class="reader-main">
            <div class="reader-toolbar">
                <div class="toolbar-left">
                    <button class="btn btn-icon" onclick="goBack()">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M19 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H19v-2z"/>
                        </svg>
                    </button>
                    <h1 id="current-title">阅读器</h1>
                </div>
                
                <div class="toolbar-right">
                    <div class="font-size-controls">
                        <button class="font-size-btn" onclick="decreaseFont()">A-</button>
                        <span class="font-size-value" id="font-size-value">18</span>
                        <button class="font-size-btn" onclick="increaseFont()">A+</button>
                    </div>
                </div>
            </div>
            
            <div class="reader-content" id="reader-content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>正在加载电子书...</p>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let currentFontSize = 18;
        
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        function showError(message) {
            document.getElementById('reader-content').innerHTML = `
                <div class="error-container">
                    <h2>加载失败</h2>
                    <p>${message}</p>
                    <button onclick="window.history.back()">返回书库</button>
                </div>
            `;
        }
        
        function showUnsupported(format) {
            const bookPath = getURLParameter('book');
            const fileName = decodeURIComponent(bookPath).split('/').pop();
            
            document.getElementById('reader-content').innerHTML = `
                <div class="unsupported-container">
                    <h2>${format.toUpperCase()} 格式</h2>
                    <p>当前格式需要外部阅读器支持</p>
                    <p>文件名: ${fileName}</p>
                    <a href="${bookPath}" download class="download-link">下载电子书</a>
                    <button onclick="window.history.back()" style="margin-top: 0.5rem;">返回书库</button>
                </div>
            `;
        }
        
        function loadTextFile(filePath) {
            fetch(filePath)
                .then(response => response.text())
                .then(text => {
                    const readerContent = document.getElementById('reader-content');
                    readerContent.innerHTML = '';
                    
                    const paragraphs = text.split('\n\n');
                    paragraphs.forEach(para => {
                        if (para.trim()) {
                            const p = document.createElement('p');
                            p.textContent = para.trim();
                            readerContent.appendChild(p);
                        }
                    });
                    
                    document.getElementById('current-title').textContent = '阅读中';
                })
                .catch(err => {
                    showError('加载 TXT 文件失败');
                });
        }
        
        function loadPDF(filePath) {
            const readerContent = document.getElementById('reader-content');
            readerContent.innerHTML = `<iframe src="${filePath}" class="pdf-container"></iframe>`;
            document.getElementById('current-title').textContent = 'PDF 阅读器';
        }
        
        function loadEPUB(filePath) {
            showUnsupported('epub');
        }
        
        function loadBook() {
            const bookPath = getURLParameter('book');
            
            if (!bookPath) {
                showError('未指定电子书文件，请从书库页面选择书籍');
                return;
            }
            
            const format = bookPath.split('.').pop().toLowerCase();
            const fileName = decodeURIComponent(bookPath).split('/').pop();
            const title = fileName.replace(/\.[^/.]+$/, '');
            
            document.getElementById('book-title').textContent = title;
            document.getElementById('book-author').textContent = '本地文件';
            
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = `<li class="toc-item"><a href="#" class="toc-link" onclick="window.scrollTo(0,0)">返回顶部</a></li>`;
            
            switch (format) {
                case 'pdf':
                    loadPDF(bookPath);
                    break;
                case 'txt':
                    loadTextFile(bookPath);
                    break;
                case 'epub':
                    loadEPUB(bookPath);
                    break;
                default:
                    showUnsupported(format);
            }
        }
        
        function goBack() {
            window.history.back();
        }
        
        function increaseFont() {
            if (currentFontSize < 32) {
                currentFontSize++;
                updateFontSize();
            }
        }
        
        function decreaseFont() {
            if (currentFontSize > 12) {
                currentFontSize--;
                updateFontSize();
            }
        }
        
        function updateFontSize() {
            document.getElementById('font-size-value').textContent = currentFontSize;
            document.getElementById('reader-content').style.fontSize = `${currentFontSize}px`;
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('reader-theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        }
        
        function closeReader() {
            window.close();
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const theme = localStorage.getItem('reader-theme') || 'light';
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            }
            
            updateFontSize();
            loadBook();
        });
    </script>
</body>
</html>
